name: Run Accessibility Scan

on:
  workflow_dispatch:
    inputs:
      scan_id:
        description: Scan job identifier
        required: true
        type: string
      target_url:
        description: URL to scan
        required: true
        type: string
      callback_url:
        description: Worker callback URL
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run accessibility scan
        run: npm run scan -w @ac/scan-runner
        env:
          SCAN_ID: ${{ inputs.scan_id }}
          TARGET_URL: ${{ inputs.target_url }}
          CALLBACK_URL: ${{ inputs.callback_url }}
          SCAN_CALLBACK_SECRET: ${{ secrets.SCAN_CALLBACK_SECRET }}
